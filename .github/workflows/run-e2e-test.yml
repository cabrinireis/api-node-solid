name: Run E2E Tests

on: [pull_request]

jobs:
    run-e2e-tests:
        name: Run E2E Tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: docker
                    POSTGRES_PASSWORD: docker
                    POSTGRES_DB: apisolid
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - name: Fix Prisma binary permissions
              run: chmod +x node_modules/.prisma/client/* || true

            - name: Wait for PostgreSQL to be ready
              run: |
                  until pg_isready -h localhost -p 5432; do
                    echo "Waiting for PostgreSQL..."
                    sleep 2
                  done

            - name: Create .env file for tests
              run: |
                  echo "DATABASE_URL=postgresql://docker:docker@localhost:5432/apisolid" >> .env
                  echo "JWT_SECRET=apinodesolidsecret" >> .env
                  echo "NODE_ENV=test" >> .env

            - name: Run E2E tests
              run: pnpm run test:e2e
